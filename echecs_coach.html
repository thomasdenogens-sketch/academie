<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Échecs Coach - Édition Pro Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); 
            color: #102a43; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }
        #app-container { 
            background: #ffffff; padding: 30px; border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(16, 42, 67, 0.15); 
            max-width: 1050px; width: 100%; text-align: center; border: 1px solid #dee2e6; position: relative;
        }
        h1 { color: #0b69a3; font-weight: 900; font-size: 2.5rem; margin-bottom: 5px; }
        .sous-titre { color: #627d98; margin-bottom: 25px; font-size: 1.1rem; font-weight: 600; }
        .xp-display { position: absolute; top: 20px; right: 30px; font-weight: bold; font-size: 1.2rem; color: #f39c12; background: #fff3cd; padding: 5px 15px; border-radius: 20px; border: 2px solid #ffeeba; }
        .onglets { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { background: #eaeaea; color: #486581; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.95rem; }
        .tab-btn.actif { background: #0b69a3; color: #ffffff; }
        .ecran { display: none; } .ecran.actif { display: block; }
        .grid-cours { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .carte-cours { background: #f0f4f8; padding: 20px; border-radius: 16px; text-align: left; border-top: 6px solid #0b69a3; }
        .btn-action-lecon { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-verrouille { background: #95a5a6; cursor: not-allowed; }
        #layout-jeu { display: flex; gap: 20px; justify-content: center; align-items: flex-start; flex-wrap: wrap; margin-top: 15px; }
        .assistant-box { background: #f0f4f8; padding: 20px; border-radius: 16px; width: 100%; max-width: 260px; text-align: left; border: 1px solid #cbd5e1; }
        .select-ia { width: 100%; padding: 8px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        #board-container { width: 100%; max-width: 440px; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); width: 100%; aspect-ratio: 1; border: 6px solid #486581; border-radius: 8px; }
        .case { display: flex; justify-content: center; align-items: center; font-size: clamp(1.8rem, 7vw, 3.2rem); cursor: pointer; position: relative; }
        .case.blanche { background-color: #ebecd0; } .case.noire { background-color: #739552; } 
        .case.selectionnee { background-color: #f1c40f !important; }
        .case.coup-valide::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(0, 0, 0, 0.2); border-radius: 50%; }
        .case.coup-attaque::after { content: ''; position: absolute; width: 80%; height: 80%; border: 6px solid rgba(0, 0, 0, 0.2); border-radius: 50%; }
        .case.guide-ouverture { background-color: #3498db !important; }
        #panneau-historique { width: 100%; max-width: 200px; height: 440px; background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        #hist-titre { background: #486581; color: white; padding: 10px; font-weight: bold; }
        #hist-liste { flex: 1; overflow-y: auto; padding: 10px; font-family: monospace; }
        .btn { font-family: 'Poppins'; font-size: 0.95rem; font-weight: 700; padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer; color: white; margin: 5px; }
        .btn-primaire { background: #2ecc71; } .btn-secondaire { background: #627d98; } .btn-oups { background: #e74c3c; }
        #statut-partie { margin-top: 15px; font-size: 1.1rem; font-weight: 900; color: #2ecc71; height: 40px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="xp-display" id="hud-xp">XP: ... ⭐</div>
        <h1>Échecs Coach 👑</h1>
        <p class="sous-titre">Édition Spéciale Pro Cloud</p>

        <div class="onglets">
            <button class="tab-btn" onclick="changerOnglet('cours')">🏰 Règles</button>
            <button class="tab-btn" onclick="changerOnglet('ouvertures')">📖 Ouvertures</button>
            <button class="tab-btn" onclick="changerOnglet('cassetetes')">🧩 Casse-Têtes</button>
            <button class="tab-btn actif" onclick="changerOnglet('jeu')">🤖 Contre l'IA</button>
        </div>

        <div id="onglet-cours" class="ecran">
            <div class="grid-cours">
                <div class="carte-cours"><h3>🏰 Le Roque</h3><p>Mets ton roi à l'abri !</p><button class="btn-action-lecon" onclick="chargerLecon('roque')">Tester</button></div>
                <div class="carte-cours"><h3>♟️ Prise en Passant</h3><p>Coup de pion spécial.</p><button class="btn-action-lecon" onclick="chargerLecon('passant')">Tester</button></div>
                <div class="carte-cours"><h3>👑 La Promotion</h3><p>Atteins le bout du plateau !</p><button class="btn-action-lecon" onclick="chargerLecon('promotion')">Tester</button></div>
            </div>
        </div>

        <div id="onglet-ouvertures" class="ecran">
            <div class="grid-cours">
                <div class="carte-cours"><h3>🇪🇸 Espagnole</h3><button class="btn-action-lecon" onclick="chargerLecon('espagnole')">Lancer</button></div>
                <div class="carte-cours"><h3>🇮🇹 Italienne</h3><button class="btn-action-lecon" onclick="chargerLecon('italienne')">Lancer</button></div>
                <div class="carte-cours"><h3>🛡️ Sicilienne</h3><button class="btn-action-lecon" onclick="chargerLecon('sicilienne')">Lancer</button></div>
            </div>
        </div>

        <div id="onglet-cassetetes" class="ecran">
            <div class="grid-cours" id="grille-defis"></div>
        </div>

        <div id="onglet-jeu" class="ecran actif">
            <div id="layout-jeu">
                <div class="assistant-box">
                    <h4>🤖 Match VS IA</h4>
                    <p id="assistant-consigne">À toi de jouer !</p>
                    <select id="niveau-ia" class="select-ia" onchange="changerNiveauIA()">
                        <option value="1">🟢 1. Débutant</option>
                        <option value="2" selected>🟠 2. Club</option>
                        <option value="3">🔴 3. Expert</option>
                    </select>
                    <div id="statut-partie">Partie en cours</div>
                </div>
                <div id="board-container"><div id="board"></div></div>
                <div id="panneau-historique"><h4 id="hist-titre">📝 Coups</h4><div id="hist-liste"></div></div>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn btn-oups" onclick="annulerCoup()">↩️ Oups !</button>
                <button class="btn btn-primaire" onclick="lancerModeMatch()">🔄 Recommencer</button>
                <button class="btn btn-secondaire" onclick="window.location.href='index.html'">🏠 Académie</button>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://academie-famille-default-rtdb.europe-west1.firebasedatabase.app/";
        const joueurActif = localStorage.getItem('sessionActiveFamille') || 'theo';

        const PIECES_UNICODE = { 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 'R': '♜', 'N': '♞', 'B': '♝', 'Q': '♛', 'K': '♚', 'P': '♟' };
        let game = new Chess(), selectedSquare = null, validMoves = [], modeActuel = 'match', tourBloque = false, niveauIA = 2, xpDuJoueur = 0;
        let leconActuelle = null, leconIndex = 0, defiActuel = null;

        const leconsToutes = {
            roque: { nom: "Le Roque", fen: '4k2r/8/8/8/8/8/8/4K2R w Kk - 0 1', coups: ['O-O'], msg: ["Déplace le Roi blanc de deux cases vers la droite (sur g1)."] },
            passant: { nom: "La Prise en Passant", fen: '8/8/8/3pP3/8/8/8/8 w - d6 0 1', coups: ['exd6'], msg: ["Capture le pion noir en diagonale sur la case d6 !"] },
            promotion: { nom: "La Promotion", fen: '8/P7/8/8/8/8/8/8 w - - 0 1', coups: ['a8=Q'], msg: ["Avance ton pion sur la dernière case (a8) !"] },
            espagnole: { nom: "L'Espagnole", coups: ['e4', 'e5', 'Nf3', 'Nc6', 'Bb5'], msg: ["Pion en e4.", "L'IA joue e5.", "Cavalier en f3.", "L'IA joue Nc6.", "Fou en b5 !"] },
            italienne: { nom: "L'Italienne", coups: ['e4', 'e5', 'Nf3', 'Nc6', 'Bc4'], msg: ["Pion en e4.", "L'IA joue e5.", "Cavalier en f3.", "L'IA joue Nc6.", "Fou en c4 !"] },
            sicilienne: { nom: "La Sicilienne", coups: ['e4', 'c5'], msg: ["L'ordinateur joue e4.", "Joue c5. C'est la Sicilienne !"] }
        };

        const defisCasseTetes = [
            { id: "mat_couloir", nom: "Mat du Couloir", xpRequis: 0, gainXP: 5, fen: '6k1/1p3ppp/8/8/8/8/1P3PPP/R5K1 w - - 0 1', rep: 'a8', msg: "Fais échec et mat avec ta Tour ! (+5 XP)" },
            { id: "fourchette", nom: "La Fourchette", xpRequis: 0, gainXP: 5, fen: 'q3k3/8/8/3N4/8/8/8/1K6 w - - 0 1', rep: 'c7', msg: "Attaque le Roi et la Reine en même temps avec le Cavalier ! (+5 XP)" },
            { id: "clouage", nom: "Le Clouage", xpRequis: 30, gainXP: 10, fen: '8/8/4k3/4r3/8/4B3/4Q3/4K3 w - - 0 1', rep: 'd4', msg: "Attaque la Tour noire bloquée avec ton Fou en d4 ! (+10 XP)" }
        ];

        async function chargerXP() {
            try {
                let res = await fetch(`${FIREBASE_URL}scores/${joueurActif}/echecsSave.json`);
                let data = await res.json();
                xpDuJoueur = data ? (parseInt(data.xp) || 0) : 0;
                E('hud-xp').textContent = `XP: ${xpDuJoueur} ⭐`;
                afficherDefis();
            } catch(e) { console.error(e); }
        }

        async function majXP(points) {
            xpDuJoueur += points;
            E('hud-xp').textContent = `XP: ${xpDuJoueur} ⭐`;
            await fetch(`${FIREBASE_URL}scores/${joueurActif}/echecsSave.json`, {
                method: 'PUT', body: JSON.stringify({ xp: xpDuJoueur })
            });
            afficherDefis();
        }

        function afficherDefis() {
            let grille = E('grille-defis'); grille.innerHTML = "";
            defisCasseTetes.forEach(defi => {
                let estDebloque = xpDuJoueur >= defi.xpRequis;
                grille.innerHTML += `<div class="carte-cours"><h3>${defi.nom}</h3><p>${defi.msg}</p>${estDebloque ? `<button class="btn-action-lecon" onclick="chargerDefi('${defi.id}')">Jouer</button>` : `<button class="btn-action-lecon btn-verrouille" disabled>🔒 ${defi.xpRequis} XP</button>`}</div>`;
            });
        }

        function changerOnglet(onglet) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('actif'));
            document.querySelectorAll('.ecran').forEach(e => e.classList.remove('actif'));
            event.target.classList.add('actif'); E('onglet-'+onglet).classList.add('actif');
            if(onglet === 'jeu' && modeActuel !== 'match') lancerModeMatch();
        }

        function changerNiveauIA() { niveauIA = parseInt(E('niveau-ia').value); }

        function lancerModeMatch() {
            modeActuel = 'match'; game.reset(); selectedSquare = null; validMoves = []; tourBloque = false;
            E('options-ia').style.display = "block"; actualiserStatut(); drawBoard();
        }

        function chargerDefi(idDefi) {
            defiActuel = defisCasseTetes.find(d => d.id === idDefi); modeActuel = 'defi';
            game.load(defiActuel.fen); selectedSquare = null; validMoves = []; tourBloque = false;
            E('options-ia').style.display = "none"; E('statut-partie').textContent = "À toi !"; drawBoard();
        }

        function chargerLecon(id) {
            modeActuel = 'lecon'; leconActuelle = leconsToutes[id]; leconIndex = 0;
            if (leconActuelle.fen) game.load(leconActuelle.fen); else game.reset();
            selectedSquare = null; validMoves = []; tourBloque = false; E('options-ia').style.display = "none";
            executerEtapeLecon();
        }

        function executerEtapeLecon() {
            if(leconIndex >= leconActuelle.coups.length) { E('statut-partie').textContent = "Terminé ! 🎉"; tourBloque = true; drawBoard(); return; }
            E('assistant-consigne').textContent = leconActuelle.msg[leconIndex];
            let moveObj = game.move(leconActuelle.coups[leconIndex]); game.undo();
            if (moveObj.color !== game.turn()) {
                tourBloque = true; drawBoard();
                setTimeout(() => { game.move(leconActuelle.coups[leconIndex]); leconIndex++; drawBoard(); tourBloque = false; executerEtapeLecon(); }, 1500);
            } else { tourBloque = false; drawBoard(); }
        }

        function annulerCoup() { if (!tourBloque) { game.undo(); game.undo(); selectedSquare = null; validMoves = []; actualiserStatut(); drawBoard(); } }

        function posToSquare(r, c) { return String.fromCharCode(97 + c) + (8 - r); }

        function drawBoard() {
            const boardDiv = E('board'); boardDiv.innerHTML = ''; let layout = game.board();
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let sqId = posToSquare(r, c); let sqDiv = document.createElement('div');
                    sqDiv.className = `case ${(r + c) % 2 === 1 ? 'noire' : 'blanche'}`;
                    let p = layout[r][c];
                    if (p) {
                        sqDiv.textContent = PIECES_UNICODE[p.type.toLowerCase()];
                        sqDiv.style.color = p.color === 'w' ? "#ffffff" : "#1e293b";
                        if(p.color === 'w') sqDiv.style.textShadow = "0 2px 4px rgba(0,0,0,0.6), -2px -2px 0 #2c3e50, 2px -2px 0 #2c3e50, -2px 2px 0 #2c3e50, 2px 2px 0 #2c3e50";
                    }
                    if (selectedSquare === sqId) sqDiv.classList.add('selectionnee');
                    if (validMoves.find(m => m.to === sqId)) sqDiv.classList.add(p ? 'coup-attaque' : 'coup-valide');
                    if (modeActuel === 'lecon' && !tourBloque && leconIndex < leconActuelle.coups.length) {
                        let m = game.move(leconActuelle.coups[leconIndex]); game.undo(); if (m.from === sqId || m.to === sqId) sqDiv.classList.add('guide-ouverture');
                    }
                    sqDiv.onclick = () => clicCase(sqId); boardDiv.appendChild(sqDiv);
                }
            }
            let hist = game.history(); let hList = E('hist-liste'); hList.innerHTML = '';
            for(let i=0; i<hist.length; i+=2) { hList.innerHTML += `<div>${(i/2)+1}. ${hist[i]} ${hist[i+1]||''}</div>`; }
        }

        function clicCase(sq) {
            if (tourBloque) return;
            let mDetails = validMoves.find(m => m.to === sq);
            if (mDetails) {
                if (modeActuel === 'lecon') {
                    let mAttendu = game.move(leconActuelle.coups[leconIndex]); game.undo();
                    if (selectedSquare === mAttendu.from && sq === mAttendu.to) { game.move({from: selectedSquare, to: sq, promotion: 'q'}); leconIndex++; drawBoard(); setTimeout(executerEtapeLecon, 400); }
                    return;
                }
                game.move({ from: selectedSquare, to: sq, promotion: 'q' }); selectedSquare = null; validMoves = []; drawBoard();
                if (modeActuel === 'defi') {
                    if (sq === defiActuel.rep) { E('statut-partie').textContent = "🌟 GAGNÉ !"; majXP(defiActuel.gainXP); tourBloque = true; }
                    else { E('statut-partie').textContent = "❌ Non..."; game.undo(); setTimeout(drawBoard, 1000); }
                    return;
                }
                if (verifierFinPartie()) return;
                tourBloque = true; E('statut-partie').textContent = "Réflexion... 🤖";
                setTimeout(jouerCoupIA, niveauIA === 3 ? 1200 : 500); return;
            }
            let p = game.get(sq); if (p && p.color === game.turn()) { selectedSquare = sq; validMoves = game.moves({ square: sq, verbose: true }); drawBoard(); }
        }

        function verifierFinPartie() {
            if (game.in_checkmate()) { E('statut-partie').textContent = game.turn() === 'b' ? "Gagné ! 🏆" : "Perdu... 💀"; if(game.turn() === 'b') majXP(20); tourBloque = true; return true; }
            if (game.in_draw()) { E('statut-partie').textContent = "Match Nul 🤝"; tourBloque = true; return true; }
            return false;
        }

        function actualiserStatut() { if (!verifierFinPartie()) E('statut-partie').textContent = game.in_check() ? "⚠️ ÉCHEC !" : "À toi !"; }

        function jouerCoupIA() {
            let moves = game.moves({ verbose: true }); if (moves.length === 0) return;
            let meilleur;
            if (niveauIA === 1) meilleur = moves[Math.floor(Math.random() * moves.length)];
            else if (niveauIA === 2) {
                let cap = moves.filter(m => m.flags.includes('c'));
                meilleur = cap.length > 0 && Math.random() > 0.4 ? cap[Math.floor(Math.random() * cap.length)] : moves[Math.floor(Math.random() * moves.length)];
            } else {
                let bestS = -9999; moves.sort(() => Math.random() - 0.5);
                for (let i = 0; i < moves.length; i++) {
                    game.move(moves[i]); let s = evaluerPlateauPro(game); game.undo(); if (s > bestS) { bestS = s; meilleur = moves[i]; }
                }
            }
            game.move(meilleur); tourBloque = false; actualiserStatut(); drawBoard();
        }

        function evaluerPlateauPro(g) {
            let v = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 }, score = 0;
            g.board().forEach(row => { row.forEach(p => { if (p) score += (p.color === 'b' ? v[p.type] : -v[p.type]); }); }); return score;
        }

        chargerXP();
    </script>
</body>
</html>
