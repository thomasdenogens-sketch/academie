<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Portail Familial - Académie</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            transition: background 0.5s; 
        }
        
        /* --- ÉCRAN SÉLECTION PROFIL --- */
        #ecran-profils { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 80vh; 
        }
        #ecran-profils h1 { font-size: 3rem; color: #2c3e50; margin-bottom: 40px; text-align: center; }
        .profils-container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        
        .profil-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .profil-card:hover { transform: scale(1.1); }
        
        .avatar { 
            width: 150px; 
            height: 150px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 5rem; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            margin-bottom: 15px; 
        }
        .avatar-theo { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .avatar-lola { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .profil-name { font-size: 1.5rem; font-weight: 900; color: #2c3e50; }

        /* --- DASHBOARD --- */
        #dashboard { 
            display: none; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 900px; 
            width: 100%; 
            text-align: center; 
            position: relative; 
        }

        #btn-changer-profil { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: #eee; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        #btn-changer-profil:hover { background: #ddd; }
        
        .titre-dash { font-weight: 900; font-size: 2.5rem; margin-bottom: 5px; }
        .sous-titre { color: #7f8c8d; margin-bottom: 30px; font-size: 1.2rem; }

        .stats-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 35px; }
        .stat-box { background: #f8f9fa; padding: 20px; border-radius: 15px; flex: 1; min-width: 150px; border: 2px solid #eee; transition: transform 0.2s; }
        .stat-valeur { font-size: 2.2rem; font-weight: 900; margin: 10px 0; }
        .stat-label { font-size: 0.9rem; color: #95a5a6; text-transform: uppercase; font-weight: bold; }

        .menu-jeux { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .carte-jeu { 
            padding: 25px 20px; 
            border-radius: 15px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
            text-decoration: none; 
            transition: transform 0.2s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
            min-height: 160px; 
        }
        .carte-jeu:active { transform: scale(0.95); }
        
        .carte-jeu h2 { font-size: 1.6rem; margin-bottom: 5px; z-index: 1; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .desc-jeu { font-size: 0.9rem; margin-bottom: 15px; font-weight: normal; opacity: 0.9; z-index: 1; }
        .xp-bulle { font-size: 0.9rem; background: rgba(0,0,0,0.25); padding: 5px 12px; border-radius: 20px; z-index: 1; backdrop-filter: blur(5px); }
        
        .icone-fond { position: absolute; font-size: 6rem; right: -10px; bottom: -20px; opacity: 0.2; transform: rotate(-15deg); }

        .j-maths { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .j-conj { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
        .j-mots { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
        .j-histoire { background: linear-gradient(135deg, #d4a373, #e9b485); }
        .j-anglais { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .j-geo { background: linear-gradient(135deg, #a8e063, #56ab2f); }
        .j-francais { background: linear-gradient(135deg, #fdc830, #f37335); }
    </style>
</head>
<body>

    <div id="ecran-profils">
        <h1>Qui s'entraîne aujourd'hui ?</h1>
        <div class="profils-container">
            <div class="profil-card" onclick="choisirProfil('theo')">
                <div class="avatar avatar-theo">👦🏼</div>
                <div class="profil-name">Théo (CM1)</div>
            </div>
            <div class="profil-card" onclick="choisirProfil('lola')">
                <div class="avatar avatar-lola">👧🏼</div>
                <div class="profil-name">Lola (CP / CE1)</div>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <button id="btn-changer-profil" onclick="deconnecter()">🔄 Changer de profil</button>
        
        <h1 class="titre-dash" id="titre-bienvenue">L'Académie</h1>
        <p class="sous-titre" id="sous-titre-dash">Ton QG d'entraînement !</p>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">✨ Expérience Totale</div>
                <div class="stat-valeur" id="total-xp" style="color: #f39c12;">0 ⭐</div>
                <div style="font-size: 0.8rem; color: #bdc3c7;">Points cumulés</div>
            </div>
        </div>

        <h3 style="text-align: left; margin-bottom: 20px; color: #2c3e50;">Choisis ta mission :</h3>
        <div class="menu-jeux" id="menu-jeux-dynamique"></div>
    </div>

    <script>
        let utilisateurActuel = null;

        // Jeux de Théo (CM1)
        const jeuxTheo = [
            { id: "maths", nom: "Mathématiques", desc: "Tables, Fractions & Défi 5 min", icone: "📊", classe: "j-maths", href: "jeu_maths_theo.html", saveKey: "mathsV8" },
            { id: "conj", nom: "Conjugaison", desc: "Le Héros des Temps", icone: "✍️", classe: "j-conj", href: "jeu_conjugaison_v6.html", saveKey: "conjHero9" },
            { id: "mots", nom: "Orthographe", desc: "Chasseur de Mots", icone: "🔎", classe: "j-mots", href: "mots_meles_v3.html", saveKey: "motsSaveV3" },
            { id: "hist", nom: "Histoire", desc: "La Machine du Temps V2", icone: "⏳", classe: "j-histoire", href: "jeu_histoire.html", saveKey: "histoireSaveV1" },
            { id: "angl", nom: "Anglais", desc: "Le Défi Bilingue", icone: "🇬🇧", classe: "j-anglais", href: "jeu_anglais.html", saveKey: "anglaisSaveV1" },
            { id: "geo", nom: "Géographie", desc: "Le Globe-Trotter", icone: "🌍", classe: "j-geo", href: "jeu_geo.html", saveKey: "geoSaveV1" },
            { id: "echecs", nom: "Échecs", desc: "Stratégies & Ouvertures", icone: "👑", classe: "j-histoire", href: "echecs_coach.html", saveKey: "echecsSave" }
        ];

        // Jeux de Lola (CP/CE1)
        const jeuxLola = [
            { id: "maths_lola", nom: "Mathématiques", desc: "Additions & Soustractions", icone: "➕", classe: "j-maths", href: "jeu_maths_lola.html", saveKey: "mathsLola" },
            { id: "francais_lola", nom: "Français", desc: "Les mots magiques", icone: "📖", classe: "j-francais", href: "jeu_francais_lola.html", saveKey: "francaisLola" },
            { id: "angl_lola", nom: "Anglais", desc: "Mes premiers mots", icone: "🇬🇧", classe: "j-anglais", href: "jeu_anglais_lola.html", saveKey: "anglaisLola" },
            { id: "geo_lola", nom: "Géographie", desc: "Découverte du Monde", icone: "🌍", classe: "j-geo", href: "jeu_geo_lola.html", saveKey: "geoLola" }
        ];

        function choisirProfil(pseudo) {
            utilisateurActuel = pseudo;
            localStorage.setItem('sessionActiveFamille', pseudo);

            document.getElementById('ecran-profils').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            if (pseudo === 'theo') {
                document.body.style.background = "linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)";
                document.getElementById('titre-bienvenue').textContent = "L'Académie de Théo 🎓";
                document.getElementById('titre-bienvenue').style.color = "#2c3e50";
                genererMenu(jeuxTheo);
            } else {
                document.body.style.background = "linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)";
                document.getElementById('titre-bienvenue').textContent = "Le Coin de Lola 🦄";
                document.getElementById('titre-bienvenue').style.color = "#d63031";
                genererMenu(jeuxLola);
            }
        }

        function deconnecter() {
            localStorage.removeItem('sessionActiveFamille');
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('ecran-profils').style.display = 'flex';
            document.body.style.background = "linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)";
        }

        function genererMenu(listeJeux) {
            const menu = document.getElementById('menu-jeux-dynamique');
            menu.innerHTML = '';
            let totalXP = 0;

            // Fonction BLINDÉE pour récupérer l'XP
            const getXP = (cle) => { 
                try {
                    let saved = localStorage.getItem(cle);
                    if (!saved) return 0; // Si pas de sauvegarde, on renvoie 0
                    
                    let data = JSON.parse(saved); // Si la sauvegarde est corrompue, ça plante ici...
                    return data.xp ? parseInt(data.xp) : 0; // Et on renvoie l'XP
                    
                } catch (erreur) {
                    // ... et le Catch attrape l'erreur au lieu de faire planter tout le site !
                    console.error("Sauvegarde cassée ignorée :", cle);
                    return 0; 
                }
            };

            let clesCalculees = new Set();

            listeJeux.forEach(jeu => {
                let xpDuJeu = getXP(jeu.saveKey);
                
                if (!clesCalculees.has(jeu.saveKey)) {
                    totalXP += xpDuJeu;
                    clesCalculees.add(jeu.saveKey);
                }

                let a = document.createElement('a');
                a.href = jeu.href;
                a.className = `carte-jeu ${jeu.classe}`;
                
                a.innerHTML = `
                    <span class="icone-fond">${jeu.icone}</span>
                    <h2>${jeu.nom}</h2>
                    <span class="desc-jeu">${jeu.desc}</span>
                    <span class="xp-bulle">XP : ${xpDuJeu} ⭐</span>
                `;
                menu.appendChild(a);
            });

            document.getElementById('total-xp').textContent = totalXP + " ⭐";
        }

        // Vérification au démarrage si une session était déjà ouverte (Blindée également)
        try {
            let session = localStorage.getItem('sessionActiveFamille');
            if (session === 'theo' || session === 'lola') {
                choisirProfil(session);
            }
        } catch(e) {
            console.error("Impossible de lire la session auto.");
        }
    </script>
</body>
</html>
