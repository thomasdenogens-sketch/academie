<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Académie de Théo & Lola</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #2c3e50; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; padding: 40px 20px; 
        }
        
        .container { max-width: 900px; width: 100%; text-align: center; }

        h1 { font-size: 3rem; font-weight: 900; color: #2c3e50; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .subtitle { font-size: 1.2rem; font-weight: 700; color: #34495e; margin-bottom: 30px; }

        /* BOUTON CARNET DE BORD */
        .btn-stats-container { margin-bottom: 40px; }
        .btn-stats { 
            background: #f39c12; color: white; padding: 15px 35px; 
            border-radius: 50px; text-decoration: none; font-size: 1.5rem; font-weight: 900; 
            box-shadow: 0 8px 20px rgba(243, 156, 18, 0.4); display: inline-block;
            transition: all 0.3s ease; border: 3px solid #fff;
        }
        .btn-stats:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 12px 25px rgba(243, 156, 18, 0.6); }

        .kids-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        /* SECTIONS DES ENFANTS */
        .kid-section { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .theo-section { border-top: 15px solid #3498db; }
        .lola-section { border-top: 15px solid #e91e63; }

        .kid-header { font-size: 2.5rem; font-weight: 900; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .theo-section .kid-header { color: #3498db; }
        .lola-section .kid-header { color: #e91e63; }

        .games-list { display: flex; flex-direction: column; gap: 15px; }

        /* BOUTONS DES JEUX */
        .game-btn {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px;
            border-radius: 15px; text-decoration: none; font-size: 1.2rem; font-weight: 800;
            color: #2c3e50; background: #f8f9fa; border: 2px solid #e2e8f0;
            transition: 0.2s;
        }
        
        .theo-section .game-btn:hover { background: #ebf5fb; border-color: #3498db; transform: translateX(5px); }
        .lola-section .game-btn:hover { background: #fce4ec; border-color: #e91e63; transform: translateX(5px); }
        
        .game-icon { font-size: 1.8rem; }

    </style>
</head>
<body>

    <div class="container">
        <h1>🎓 L'Académie de la Famille</h1>
        <p class="subtitle">Apprendre, jouer et progresser ensemble !</p>

        <div class="btn-stats-container">
            <a href="stats_enfants.html" class="btn-stats">🏆 Voir notre Carnet de Bord !</a>
        </div>

        <div class="kids-grid">
            
            <div class="kid-section theo-section">
                <div class="kid-header">👦 Théo</div>
                <div class="games-list">
                    <a href="jeu_maths_theo.html" class="game-btn">
                        <span class="game-icon">🧮</span><span>Mathématiques</span>
                    </a>
                    <a href="echecs_coach.html" class="game-btn">
                        <span class="game-icon">♞</span><span>Échecs</span>
                    </a>
                    <a href="jeu_conjugaison_v6.html" class="game-btn">
                        <span class="game-icon">✍️</span><span>Conjugaison</span>
                    </a>
                    <a href="mots_meles_v3.html" class="game-btn">
                        <span class="game-icon">📖</span><span>Orthographe</span>
                    </a>
                    <a href="jeu_histoire.html" class="game-btn">
                        <span class="game-icon">🏰</span><span>Histoire</span>
                    </a>
                    <a href="jeu_anglais.html" class="game-btn">
                        <span class="game-icon">🇬🇧</span><span>Anglais</span>
                    </a>
                    <a href="jeu_geo.html" class="game-btn">
                        <span class="game-icon">🌍</span><span>Géographie</span>
                    </a>
                </div>
            </div>

            <div class="kid-section lola-section">
                <div class="kid-header">👧 Lola</div>
                <div class="games-list">
                    <a href="jeu_maths_lola.html" class="game-btn">
                        <span class="game-icon">🧮</span><span>Mathématiques</span>
                    </a>
                    <a href="jeu_francais_lola.html" class="game-btn">
                        <span class="game-icon">📚</span><span>Français</span>
                    </a>
                    <a href="jeu_anglais_lola.html" class="game-btn">
                        <span class="game-icon">🇬🇧</span><span>Anglais Découverte</span>
                    </a>
                    <a href="jeu_geo_lola.html" class="game-btn">
                        <span class="game-icon">🌍</span><span>Géographie</span>
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
