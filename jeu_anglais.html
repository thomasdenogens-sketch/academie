<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Anglais - Le Défi Bilingue V2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #app-container { background: white; padding: 25px 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); max-width: 900px; width: 100%; text-align: center; }
        h1 { color: #d63031; font-weight: 900; font-size: 2.2rem; margin-bottom: 5px; }
        .sous-titre { color: #888; margin-bottom: 20px; font-weight: 700; }
        #hud { display: flex; justify-content: space-between; background: #f8f9fa; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; }
        .xp-text { color: #0984e3; font-weight: 900; }
        .vies-text { letter-spacing: 5px; }
        #plateau-jeu { display: flex; justify-content: space-around; gap: 20px; background: #f1f2f6; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .colonne { display: flex; flex-direction: column; gap: 10px; width: 45%; }
        .colonne-titre { font-size: 1.2rem; font-weight: 900; color: #2d3436; margin-bottom: 10px; }
        .carte-mot { background: white; border: 3px solid #dfe6e9; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; color: #2d3436; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .carte-mot:hover { transform: translateY(-2px); box-shadow: 0 6px 10px rgba(0,0,0,0.1); }
        .carte-en.selectionnee { border-color: #0984e3; background: #e7f3ff; color: #0984e3; transform: scale(1.05); }
        .carte-fr.selectionnee { border-color: #d63031; background: #ffeaea; color: #d63031; transform: scale(1.05); }
        .trouvee { visibility: hidden; opacity: 0; transition: visibility 0s 0.3s, opacity 0.3s linear; }
        .erreur { animation: secousse 0.4s; background: #ff7675 !important; color: white !important; border-color: #d63031 !important; }
        @keyframes secousse { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .btn { font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: bold; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; color: white; margin: 5px; transition: transform 0.1s; display: inline-block;}
        .btn:active { transform: scale(0.95); }
        .btn-primaire { background: #0984e3; box-shadow: 0 4px #076aba; }
        .btn-secondaire { background: #b2bec3; box-shadow: 0 4px #636e72; color: #2d3436; }
        .btn-supprimer { background: #ff7675; padding: 12px 15px; box-shadow: 0 4px #d63031; }
        #zone-config { background: #fff3cd; padding: 20px; border-radius: 15px; margin-top: 20px; border: 2px dashed #ffeeba; text-align: left; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1rem; }
        .ecran { display: none; }
        .ecran.actif { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        #feedback { font-size: 1.2rem; font-weight: bold; height: 30px; margin: 15px 0; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="ecran-accueil" class="ecran actif">
            <h1>English 🇬🇧</h1>
            <p class="sous-titre">Le Défi Bilingue V2</p>
            <div id="hud" style="justify-content: center;"><span class="xp-text">XP Anglais : <span id="ui-xp-accueil">0</span> ⭐</span></div>
            
            <h3>Missions de base :</h3>
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primaire" onclick="lancerNiveau('couleurs', false)">🎨 Couleurs</button>
                <button class="btn btn-primaire" style="background:#00b894; box-shadow:0 4px #009476;" onclick="lancerNiveau('animaux', false)">🐶 Animaux</button>
                <button class="btn btn-primaire" style="background:#fdcb6e; box-shadow:0 4px #e1b12c; color:#2d3436;" onclick="lancerNiveau('famille', false)">👨‍👩‍👧 Famille</button>
                <button class="btn btn-primaire" style="background:#e84393; box-shadow:0 4px #b83275;" onclick="lancerNiveau('corps', false)">🖐️ Corps</button>
                <button class="btn btn-primaire" style="background:#8e44ad; box-shadow:0 4px #732d91;" onclick="lancerNiveau('nombres', false)">🔢 Nombres</button>
                <button class="btn btn-primaire" style="background:#f39c12; box-shadow:0 4px #d68910;" onclick="lancerNiveau('meteo', false)">☀️ Météo</button>
                <button class="btn btn-primaire" style="background:#d35400; box-shadow:0 4px #a04000;" onclick="lancerNiveau('aliments', false)">🍎 Nourriture</button>
            </div>

            <hr style="border: 1px solid #eee; margin: 20px 0;">
            <h3>Tes propres listes :</h3>
            <div id="liste-themes-custom"></div>

            <div style="margin-top: 30px;">
                <button class="btn btn-primaire" style="background: #2d3436; box-shadow: 0 4px #000;" onclick="changerEcran('ecran-config')">➕ Créer une nouvelle liste</button>
                <br><button class="btn btn-secondaire" style="margin-top: 15px;" onclick="window.location.href='academie.html'">Retour à l'Académie</button>
            </div>
        </div>

        <div id="ecran-jeu" class="ecran">
            <div id="hud"><span class="vies-text" id="ui-vies">❤️❤️❤️</span><span id="ui-theme-titre" style="color: #636e72;">Thème : ...</span><span class="xp-text">XP : <span id="ui-xp-jeu">0</span> ⭐</span></div>
            <div id="plateau-jeu"><div class="colonne" id="col-en"><div class="colonne-titre">🇬🇧 English</div></div><div class="colonne" id="col-fr"><div class="colonne-titre">🇫🇷 Français</div></div></div>
            <div id="feedback"></div>
            <button class="btn btn-secondaire" onclick="retourAccueil()">Abandonner</button>
        </div>

        <div id="ecran-config" class="ecran">
            <h2 style="color: #d63031;">✍️ Espace Création</h2>
            <p>Ajoute tes propres mots de vocabulaire !</p>
            <div id="zone-config">
                <label><strong>Nom de la liste (ex: Leçon 3) :</strong></label>
                <input type="text" id="input-nom-theme" placeholder="Titre de la leçon...">
                <label><strong>Les mots (1 par ligne, avec le signe = ) :</strong></label>
                <textarea id="input-mots" rows="6" placeholder="Apple = Pomme&#10;Banana = Banane"></textarea>
                <button class="btn btn-primaire" style="background: #00b894; box-shadow: 0 4px #009476;" onclick="sauvegarderTheme()">Sauvegarder</button>
                <p id="msg-config" style="color: green; font-weight: bold; margin-top: 10px;"></p>
            </div>
            <button class="btn btn-secondaire" style="margin-top: 20px;" onclick="retourAccueil()">Retour Menu</button>
        </div>

        <div id="ecran-fin" class="ecran">
            <h1>Well Done ! 🎉</h1>
            <p class="sous-titre">Tu as trouvé toutes les paires !</p>
            <div id="hud" style="justify-content: center;"><span class="xp-text" style="font-size: 1.5rem;">+<span id="gain-xp"></span> XP gagnés !</span></div>
            <button class="btn btn-primaire" onclick="window.location.href='academie.html'">Retour à l'Académie</button>
            <button class="btn btn-secondaire" onclick="retourAccueil()">Refaire un thème</button>
        </div>
    </div>

    <script>
        const vocabulaireBase = {
            couleurs: { nom: "Les Couleurs", mots: [{ en: "Red", fr: "Rouge" }, { en: "Blue", fr: "Bleu" }, { en: "Yellow", fr: "Jaune" }, { en: "Green", fr: "Vert" }, { en: "Black", fr: "Noir" }, { en: "White", fr: "Blanc" }] },
            animaux: { nom: "Les Animaux", mots: [{ en: "Dog", fr: "Chien" }, { en: "Cat", fr: "Chat" }, { en: "Bird", fr: "Oiseau" }, { en: "Horse", fr: "Cheval" }, { en: "Fish", fr: "Poisson" }, { en: "Mouse", fr: "Souris" }, { en: "Lion", fr: "Lion" }, { en: "Monkey", fr: "Singe" }] },
            famille: { nom: "La Famille", mots: [{ en: "Father", fr: "Père" }, { en: "Mother", fr: "Mère" }, { en: "Brother", fr: "Frère" }, { en: "Sister", fr: "Sœur" }, { en: "Grandfather", fr: "Grand-père" }, { en: "Grandmother", fr: "Grand-mère" }] },
            corps: { nom: "Le Corps Humain", mots: [{ en: "Head", fr: "Tête" }, { en: "Arm", fr: "Bras" }, { en: "Leg", fr: "Jambe" }, { en: "Hand", fr: "Main" }, { en: "Eye", fr: "Œil" }, { en: "Mouth", fr: "Bouche" }] },
            nombres: { nom: "Les Nombres (1-10)", mots: [{ en: "One", fr: "Un" }, { en: "Two", fr: "Deux" }, { en: "Three", fr: "Trois" }, { en: "Four", fr: "Quatre" }, { en: "Five", fr: "Cinq" }, { en: "Six", fr: "Six" }, { en: "Seven", fr: "Sept" }, { en: "Eight", fr: "Huit" }, { en: "Nine", fr: "Neuf" }, { en: "Ten", fr: "Dix" }] },
            meteo: { nom: "La Météo", mots: [{ en: "Sun", fr: "Soleil" }, { en: "Rain", fr: "Pluie" }, { en: "Snow", fr: "Neige" }, { en: "Wind", fr: "Vent" }, { en: "Cloud", fr: "Nuage" }, { en: "Storm", fr: "Orage" }] },
            aliments: { nom: "La Nourriture", mots: [{ en: "Apple", fr: "Pomme" }, { en: "Bread", fr: "Pain" }, { en: "Cheese", fr: "Fromage" }, { en: "Water", fr: "Eau" }, { en: "Milk", fr: "Lait" }, { en: "Cake", fr: "Gâteau" }] }
        };

        let profil = JSON.parse(localStorage.getItem('anglaisSaveV1')) || { xp: 0 };
        let customThemes = JSON.parse(localStorage.getItem('anglaisCustomV1')) || {};
        let vies = 3; let pairesTrouvees = 0; let totalPaires = 0; let themeActuelId = ""; let isThemeCustom = false; let nomThemeActuel = "";
        let selectionEn = null; let selectionFr = null;

        function majAccueil() {
            document.getElementById('ui-xp-accueil').textContent = profil.xp;
            const conteneurCustom = document.getElementById('liste-themes-custom'); conteneurCustom.innerHTML = '';
            if (Object.keys(customThemes).length === 0) { conteneurCustom.innerHTML = "<p style='color:#bbb; font-style:italic;'>Tu n'as pas encore créé de liste.</p>"; } 
            else {
                for (let id in customThemes) {
                    let div = document.createElement('div'); div.style.display = "inline-block";
                    let btn = document.createElement('button'); btn.className = 'btn btn-primaire'; btn.style.backgroundColor = '#6c5ce7'; btn.style.boxShadow = '0 4px #4834d4'; btn.textContent = customThemes[id].nom + " ⭐"; btn.onclick = () => lancerNiveau(id, true);
                    let btnDel = document.createElement('button'); btnDel.className = 'btn btn-supprimer'; btnDel.textContent = "X"; btnDel.onclick = () => { delete customThemes[id]; sauverCustom(); majAccueil(); };
                    div.appendChild(btn); div.appendChild(btnDel); conteneurCustom.appendChild(div);
                }
            }
        }

        function sauverProfil() { localStorage.setItem('anglaisSaveV1', JSON.stringify(profil)); document.getElementById('ui-xp-accueil').textContent = profil.xp; document.getElementById('ui-xp-jeu').textContent = profil.xp; }
        function sauverCustom() { localStorage.setItem('anglaisCustomV1', JSON.stringify(customThemes)); }
        function sauvegarderTheme() {
            let nom = document.getElementById('input-nom-theme').value.trim(); let motsBruts = document.getElementById('input-mots').value;
            if(!nom || !motsBruts) return alert("Remplis le titre et les mots !");
            let lignes = motsBruts.split('\n'); let listeMotsPaires = [];
            for(let ligne of lignes) { if(ligne.includes('=')) { let parties = ligne.split('='); let motEn = parties[0].trim(); let motFr = parties[1].trim(); if(motEn.length > 0 && motFr.length > 0) { listeMotsPaires.push({ en: motEn, fr: motFr }); } } }
            if(listeMotsPaires.length < 2) return alert("Il faut au moins 2 paires (avec un signe = entre les mots) !");
            let id = 'custom_' + Date.now(); customThemes[id] = { nom: nom, mots: listeMotsPaires }; sauverCustom();
            document.getElementById('msg-config').textContent = "Liste sauvegardée !"; document.getElementById('input-nom-theme').value = ""; document.getElementById('input-mots').value = "";
            setTimeout(() => document.getElementById('msg-config').textContent = "", 3000); majAccueil();
        }

        function changerEcran(id) { document.querySelectorAll('.ecran').forEach(e => e.classList.remove('actif')); document.getElementById(id).classList.add('actif'); }
        function retourAccueil() { changerEcran('ecran-accueil'); majAccueil(); }

        function lancerNiveau(idTheme, isCustom) {
            vies = 3; pairesTrouvees = 0; selectionEn = null; selectionFr = null; themeActuelId = idTheme; isThemeCustom = isCustom;
            let themeData = isCustom ? customThemes[idTheme] : vocabulaireBase[idTheme]; totalPaires = themeData.mots.length; nomThemeActuel = themeData.nom;
            document.getElementById('ui-vies').textContent = "❤️❤️❤️"; document.getElementById('ui-xp-jeu').textContent = profil.xp; document.getElementById('ui-theme-titre').textContent = nomThemeActuel; document.getElementById('feedback').textContent = "";
            preparerPlateau(themeData.mots); changerEcran('ecran-jeu');
        }

        function preparerPlateau(listeMots) {
            const colEn = document.getElementById('col-en'); const colFr = document.getElementById('col-fr');
            colEn.innerHTML = '<div class="colonne-titre">🇬🇧 English</div>'; colFr.innerHTML = '<div class="colonne-titre">🇫🇷 Français</div>';
            let motsEn = [...listeMots].sort(() => Math.random() - 0.5); let motsFr = [...listeMots].sort(() => Math.random() - 0.5);
            motsEn.forEach(paire => { let div = document.createElement('div'); div.className = 'carte-mot carte-en'; div.textContent = paire.en; div.dataset.motId = paire.en; div.onclick = () => clicCarte(div, 'en', paire.en, paire.fr); colEn.appendChild(div); });
            motsFr.forEach(paire => { let div = document.createElement('div'); div.className = 'carte-mot carte-fr'; div.textContent = paire.fr; div.dataset.motId = paire.fr; div.onclick = () => clicCarte(div, 'fr', paire.fr, paire.en); colFr.appendChild(div); });
        }

        function clicCarte(element, langue, motTexte, motAssocie) {
            if (element.classList.contains('trouvee')) return;
            if (langue === 'en') { if (selectionEn) selectionEn.element.classList.remove('selectionnee'); if (selectionEn && selectionEn.element === element) { selectionEn = null; return; } selectionEn = { element: element, texte: motTexte, associe: motAssocie }; element.classList.add('selectionnee'); } 
            else { if (selectionFr) selectionFr.element.classList.remove('selectionnee'); if (selectionFr && selectionFr.element === element) { selectionFr = null; return; } selectionFr = { element: element, texte: motTexte, associe: motAssocie }; element.classList.add('selectionnee'); }
            if (selectionEn && selectionFr) verifierPaire();
        }

        function verifierPaire() {
            const fb = document.getElementById('feedback');
            if (selectionEn.associe === selectionFr.texte) {
                fb.textContent = "Yes! Correct! 🟢"; fb.style.color = "#00b894";
                selectionEn.element.style.background = "#55efc4"; selectionEn.element.style.color = "white"; selectionFr.element.style.background = "#55efc4"; selectionFr.element.style.color = "white";
                let elEn = selectionEn.element; let elFr = selectionFr.element; setTimeout(() => { elEn.classList.add('trouvee'); elFr.classList.add('trouvee'); }, 500);
                profil.xp += 10; sauverProfil(); pairesTrouvees++; if (pairesTrouvees === totalPaires) setTimeout(gagnerNiveau, 1000);
            } else {
                fb.textContent = "Oops! Try again... 🔴"; fb.style.color = "#d63031"; vies--; document.getElementById('ui-vies').textContent = "❤️".repeat(vies) + "🖤".repeat(3 - vies);
                selectionEn.element.classList.add('erreur'); selectionFr.element.classList.add('erreur');
                let elEn = selectionEn.element; let elFr = selectionFr.element;
                setTimeout(() => { elEn.classList.remove('erreur', 'selectionnee'); elFr.classList.remove('erreur', 'selectionnee'); fb.textContent = ""; }, 800);
                if (vies <= 0) { setTimeout(() => { alert("Plus de vies ! Retente ta chance."); lancerNiveau(themeActuelId, isThemeCustom); }, 1000); }
            }
            selectionEn = null; selectionFr = null;
        }

        function gagnerNiveau() { let bonus = vies * 10; profil.xp += 50 + bonus; sauverProfil(); document.getElementById('gain-xp').textContent = 50 + bonus + (totalPaires * 10); changerEcran('ecran-fin'); }
        majAccueil();
    </script>
</body>
</html>
