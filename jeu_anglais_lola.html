<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>English Kids - Lola Cloud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #2c3e50; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 600px; width: 100%; text-align: center; position: relative; }
        h1 { color: #e91e63; font-weight: 900; margin-bottom: 5px; }
        .xp { position: absolute; top: 20px; right: 25px; font-weight: bold; background: #fff3cd; color: #f39c12; padding: 5px 15px; border-radius: 20px; border: 2px solid #ffeeba; }
        #mot-anglais { font-size: 2.5rem; font-weight: 900; color: #34495e; margin: 30px 0; background: #f8f9fa; padding: 15px; border-radius: 15px; border: 2px dashed #e91e63; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn-opt { background: #ffffff; border: 2px solid #cbd5e1; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-opt:hover { background: #f1f5f9; transform: scale(1.03); }
        .btn { background: #627d98; color: white; padding: 10px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; text-decoration: none; display: inline-block; }
        #feedback { font-size: 1.3rem; font-weight: 900; height: 30px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="app">
        <div class="xp" id="hud-xp">XP: ... ⭐</div>
        <h1>Hello Lola ! 🇬🇧</h1>
        <p style="color: #7f8c8d; font-weight: bold;">Apprends tes premiers mots en t'amusant</p>

        <div id="mot-anglais">...</div>
        <div class="options" id="zone-options"></div>
        <div id="feedback"></div>

        <button class="btn" onclick="window.location.href='index.html'">🏠 Retour à l'Académie</button>
    </div>

    <script>
        const FIREBASE_URL = "https://academie-famille-default-rtdb.europe-west1.firebasedatabase.app/";
        const DB_URL = `${FIREBASE_URL}scores/lola/anglaisLola.json`;
        
        let xpGlobale = 0, questionActuelle = null;

        const dictionnaire = [
            { en: "A cat 🐱", r: ["Un chat", "Un chien", "Un oiseau", "Un cheval"], c: 0 },
            { en: "A dog 🐶", r: ["Un chat", "Un lapin", "Un chien", "Un poisson"], c: 2 },
            { en: "The sun ☀️", r: ["La lune", "La pluie", "Le soleil", "Une étoile"], c: 2 },
            { en: "An apple 🍎", r: ["Une poire", "Une pomme", "Une banane", "Une fraise"], c: 1 },
            { en: "One, Two, Three 🔢", r: ["4, 5, 6", "7, 8, 9", "1, 2, 3", "Bleu, Blanc, Rouge"], c: 2 },
            { en: "Red 🔴", r: ["Vert", "Bleu", "Jaune", "Rouge"], c: 3 },
            { en: "Blue 🔵", r: ["Bleu", "Rouge", "Vert", "Noir"], c: 0 }
        ];

        async function chargerXP() {
            try {
                let res = await fetch(DB_URL);
                let data = await res.json();
                if (data && data.xp !== undefined) {
                    xpGlobale = parseInt(data.xp) || 0;
                }
                document.getElementById('hud-xp').textContent = `XP: ${xpGlobale} ⭐`;
            } catch(e) { console.error("Erreur Firebase:", e); }
            NouvelleQuestion();
        }

        async function ajouterXP(p) {
            xpGlobale += p;
            document.getElementById('hud-xp').textContent = `XP: ${xpGlobale} ⭐`;
            try {
                await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ xp: xpGlobale }) });
            } catch(e) { console.error("Erreur Firebase:", e); }
        }

        function NouvelleQuestion() {
            document.getElementById('feedback').textContent = "";
            questionActuelle = dictionnaire[Math.floor(Math.random() * dictionnaire.length)];
            
            document.getElementById('mot-anglais').textContent = questionActuelle.en;
            const zone = document.getElementById('zone-options');
            zone.innerHTML = "";

            questionActuelle.r.forEach((opt, idx) => {
                let b = document.createElement('button');
                b.className = "btn-opt";
                b.textContent = opt;
                b.onclick = () => verifierReponse(idx);
                zone.appendChild(b);
            });
        }

        function verifierReponse(idx) {
            const fb = document.getElementById('feedback');
            if (idx === questionActuelle.c) {
                fb.textContent = "🌟 YES! Good job Lola !";
                fb.style.color = "#2ecc71";
                ajouterXP(5);
                setTimeout(NouvelleQuestion, 1800);
            } else {
                fb.textContent = "❌ Oh no... Try again !";
                fb.style.color = "#e74c3c";
            }
        }

        chargerXP();
    </script>
</body>
</html>
