<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugaison Héro 9 - Édition Cloud</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00cec9; --bonus: #e84393; --bg: #dfe6e9; --card: #ffffff; --text: #2d3436; --success: #00b894; --warning: #fdcb6e; --danger: #d63031; --font: 'Verdana', sans-serif; }
        body { font-family: var(--font); background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: white; width: 100%; padding: 10px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-inner { max-width: 800px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .stats-box { font-size: 0.9em; }
        .xp-track { width: 140px; height: 10px; background: #b2bec3; border-radius: 5px; margin-top: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: #fdcb6e; width: 0%; transition: width 0.5s; }
        .hearts-container { font-size: 1.5em; letter-spacing: 5px; margin: 0 15px; }
        .btn-cfg { background: #b2bec3; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-cfg:hover { background: #636e72; color: white; }
        #game-board { background: var(--card); width: 90%; max-width: 650px; margin-top: 30px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .round-tag { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 8px 25px; border-radius: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.4); transition: background 0.3s; }
        .bonus-mode { background: var(--bonus) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% {transform: translateX(-50%) scale(1);} 50% {transform: translateX(-50%) scale(1.05);} 100% {transform: translateX(-50%) scale(1);} }
        .q-box { background: #f1f2f6; border-radius: 15px; padding: 25px; margin: 25px 0; font-size: 1.3em; line-height: 1.5; border-left: 6px solid var(--secondary); }
        .highlight { color: var(--primary); font-weight: bold; }
        .tense-hl { color: var(--danger); text-decoration: underline; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1.3em; border: 2px solid #b2bec3; border-radius: 10px; text-align: center; outline: none; box-sizing: border-box; }
        input[type="text"]:focus { border-color: var(--primary); }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 40px; font-size: 1.2em; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 15px; box-shadow: 0 5px #4834d4; transition: transform 0.1s; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }
        .btn-bonus { background: var(--bonus); box-shadow: 0 5px #c44569; }
        #feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        .fb-success { background: #dff9fb; border: 2px solid var(--success); color: #009476; }
        .fb-warning { background: #fff3cd; border: 2px solid var(--warning); color: #856404; }
        .fb-error { background: #ff7675; border: 2px solid var(--danger); color: white; }
        .fb-title { font-weight: bold; font-size: 1.2em; margin-bottom: 5px; display: block; }
        .fb-correction { font-size: 1.3em; font-weight: bold; margin-top: 5px; display: text-decoration: underline;}
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .cfg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; }
        .cfg-section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .err-table { width: 100%; text-align: left; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        .err-table td { padding: 5px; border-bottom: 1px solid #eee; }
        .err-bad { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="stats-box">
            <div>XP Total <b id="lvl-display" style="color: #e84393;">0</b> ⭐</div>
            <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
            <div style="font-size:0.8em" id="xp-text">0/100</div>
        </div>
        <div class="hearts-container" id="hearts-display">❤️❤️❤️</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-cfg" onclick="window.location.href='index.html'">🏠 Académie</button>
            <button class="btn-cfg" onclick="openSettings()">⚙️ Options</button>
        </div>
    </div>
</header>

<div id="game-board">
    <div class="round-tag" id="round-tag">Manche 1 / 3</div>
    <div id="game-ui">
        <p id="instruction" style="color:#636e72; font-style:italic;">...</p>
        <div class="q-box" id="q-content">Chargement...</div>
        <input type="text" id="inp-answer" placeholder="Ta réponse..." autocomplete="off">
        <br>
        <button class="btn-main" onclick="checkAnswer()">VALIDER</button>
    </div>
    <div id="feedback-area">
        <span class="fb-title" id="fb-title"></span><span id="fb-msg"></span><span class="fb-correction" id="fb-corr"></span>
    </div>
    <div style="margin-top:20px; color:#b2bec3; font-size:0.9em;">Question <span id="q-idx">1</span> / <span id="q-total">10</span></div>
</div>

<div id="modal-round" class="modal">
    <div class="modal-box">
        <h2 id="mod-title">Bilan</h2>
        <div id="mod-body"></div><br>
        <div id="mod-actions" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap;"></div>
    </div>
</div>

<div id="modal-settings" class="modal">
    <div class="modal-box" style="text-align:left;">
        <h2 style="text-align:center; margin-top:0;">Configuration</h2>
        <div class="cfg-section">
            <h3>⏳ Temps actifs</h3>
            <div class="cfg-grid">
                <label><input type="checkbox" id="t-pres" checked> Présent</label><label><input type="checkbox" id="t-imp" checked> Imparfait</label>
                <label><input type="checkbox" id="t-pc" checked> Passé Composé</label><label><input type="checkbox" id="t-fut" checked> Futur</label>
            </div>
        </div>
        <div class="cfg-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0;">📝 Verbes actifs</h3><button style="font-size:0.8em; cursor:pointer;" onclick="toggleAllVerbs()">Tout cocher</button>
            </div>
            <div class="cfg-grid" id="verb-list" style="max-height:150px; overflow-y:auto; margin-top:10px;"></div>
        </div>
        <div style="text-align:center;">
            <button class="btn-main" style="padding:10px 30px; margin-left:10px; font-size:1em;" onclick="saveSettings()">OK</button>
        </div>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://academie-famille-default-rtdb.europe-west1.firebasedatabase.app/";
    const DB_URL = `${FIREBASE_URL}scores/theo/conjHero9.json`;

    const PRONOUNS = ['je', 'tu', 'il', 'elle', 'on', 'nous', 'vous', 'ils', 'elles'];
    const SUBJECTS = [{txt:"Mon frère", i:2}, {txt:"Ma soeur", i:3}, {txt:"Le chat", i:2}, {txt:"Les enfants", i:7}, {txt:"Mes amies", i:8}, {txt:"Toi et moi", i:5}, {txt:"Lui et toi", i:6}];
    const VERBS = {
        'marcher': {t:'er', aux:'avoir', comp:'vite'}, 'chanter': {t:'er', aux:'avoir', comp:'une chanson'}, 'manger':  {t:'er', aux:'avoir', comp:'une pomme'}, 'jouer':   {t:'er', aux:'avoir', comp:'au ballon'}, 'lancer':  {t:'er', aux:'avoir', comp:'la balle'},
        'être': { aux:'avoir', comp:'heureux', present:['suis','es','est','est','est','sommes','êtes','sont','sont'], imparfait:['étais','étais','était','était','était','étions','étiez','étaient','étaient'], futur:['serai','seras','sera','sera','sera','serons','serez','seront','seront'], pp:'été' },
        'avoir': { aux:'avoir', comp:'faim', present:['ai','as','a','a','a','avons','avez','ont','ont'], imparfait:['avais','avais','avait','avait','avait','avions','aviez','avaient','avaient'], futur:['aurai','auras','aura','aura','aura','aurons','aurez','auront','auront'], pp:'eu' },
        'aller': { aux:'être', comp:'au parc', present:['vais','vas','va','va','va','allons','allez','vont','vont'], imparfait:['allais','allais','allait','allait','allait','allions','alliez','allaient','allaient'], futur:['irai','iras','ira','ira','ira','irons','irez','iront','iront'], pp:'allé' },
        'faire': { aux:'avoir', comp:'du vélo', present:['fais','fais','fait','fait','fait','faisons','faites','font','font'], imparfait:['faisais','faisais','faisait','faisait','faisait','faisions','faisiez','faisaient','faisaient'], futur:['ferai','feras','fera','fera','fera','ferons','ferez','feront','feront'], pp:'fait' },
        'dire': { aux:'avoir', comp:'bonjour', present:['dis','dis','dit','dit','dit','disons','dites','disent','disent'], imparfait:['disais','disais','disait','disait','disait','disions','disiez','disaient','disaient'], futur:['dirai','diras','dira','dira','dira','dirons','direz','diront','diront'], pp:'dit' },
        'voir': { aux:'avoir', comp:'un oiseau', present:['vois','vois','voit','voit','voit','voyons','voyez','voient','voient'], imparfait:['voyais','voyais','voyait','voyait','voyait','voyions','voyiez','voyaient','voyaient'], futur:['verrai','verras','verra','verra','verra','verrons','verrez','verront','verront'], pp:'vu' },
        'pouvoir': { aux:'avoir', comp:'gagner', present:['peux','peux','peut','peut','peut','pouvons','pouvez','peuvent','peuvent'], imparfait:['pouvais','pouvais','pouvait','pouvait','pouvait','pouvions','pouviez','pouvaient','pouvaient'], futur:['pourrai','pourras','pourra','pourra','pourra','pourrons','pourrez','pourront','pourront'], pp:'pu' },
        'vouloir': { aux:'avoir', comp:'dormir', present:['veux','veux','veut','veut','veut','voulons','voulez','veulent','veulent'], imparfait:['voulais','voulais','voulait','voulait','voulait','voulions','vouliez','voulaient','voulaient'], futur:['voudrai','voudras','voudra','voudra','voudra','voudrons','voudrez','voudront','voudront'], pp:'voulu' },
        'venir': { aux:'être', comp:'ici', present:['viens','viens','vient','vient','vient','venons','venez','viennent','viennent'], imparfait:['venais','venais','venait','venait','venait','venions','veniez','venaient','venaient'], futur:['viendrai','viendras','viendra','viendra','viendra','viendrons','viendrez','viendront','viendront'], pp:'venu' },
        'prendre': { aux:'avoir', comp:'le bus', present:['prends','prends','prend','prend','prend','prenons','prenez','prennent','prennent'], imparfait:['prenais','prenais','prenait','prenait','prenait','prenions','preniez','prenaient','prenaient'], futur:['prendrai','prendras','prendra','prendra','prendra','prendrons','prendrez','prendront','prendront'], pp:'pris' }
    };
    
    let gameData = { totalXP:0, xpNext:100, activeTenses:['present','imparfait','passe_compose'], activeVerbs: Object.keys(VERBS) };
    let session = { round:1, lives:3, qDone:0, qTotal:10, mistakes:[], current:null };

    // --- SAUVEGARDE CLOUD FIREBASE ---
    async function loadGame() {
        try {
            let res = await fetch(DB_URL);
            let data = await res.json();
            if (data && data.xp !== undefined) {
                gameData.totalXP = parseInt(data.xp) || 0;
            }
        } catch(e) {}
        
        // Charger les paramètres de verbes locaux pour ne pas les perdre
        let localData = JSON.parse(localStorage.getItem('conjSettingsHero9'));
        if(localData) {
            gameData.activeTenses = localData.activeTenses;
            gameData.activeVerbs = localData.activeVerbs;
        }
        updateUI();
    }

    async function saveGameCloud() {
        try {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ xp: gameData.totalXP }) });
        } catch(e) {}
    }

    function saveSettingsLocal() {
        localStorage.setItem('conjSettingsHero9', JSON.stringify({ activeTenses: gameData.activeTenses, activeVerbs: gameData.activeVerbs }));
    }
    // ----------------------------------

    function conjuguer(verb, tense, i) {
        let v = VERBS[verb];
        if(tense === 'passe_compose') {
            let aux = v.aux; let auxConj = VERBS[aux].present[i]; let pp = v.pp;
            if(v.t==='er') pp = verb.slice(0,-2)+'é';
            if(aux==='être') { if(i===3) pp+='e'; if(i>=5&&i<=7) pp+='s'; if(i===8) pp+='es'; }
            return `${auxConj} ${pp}`;
        }
        if(v.t === 'er') {
            let r = verb.slice(0,-2);
            if(tense==='present') { if(verb.endsWith('ger') && i===5) r+='e'; if(verb.endsWith('cer') && i===5) r=r.slice(0,-1)+'ç'; return r+['e','es','e','e','e','ons','ez','ent','ent'][i]; }
            if(tense==='imparfait') { if(verb.endsWith('ger')) r+='e'; if(verb.endsWith('cer')) r=r.slice(0,-1)+'ç'; if(i===5||i===6) r=verb.slice(0,-2); return r+['ais','ais','ait','ait','ait','ions','iez','aient','aient'][i]; }
            if(tense==='futur') return verb+['ai','as','a','a','a','ons','ez','ont','ont'][i];
        }
        return v[tense][i];
    }
    
    function getAdjAccord(verb, i) { let c = VERBS[verb].comp; if(verb === 'être') { if(i >= 5 && !c.endsWith('x')) c += 's'; } return c; }
    function tenseLabelWithPrep(t) { if(t === 'imparfait') return "à l'Imparfait"; if(t === 'present') return "au Présent"; if(t === 'futur') return "au Futur"; if(t === 'passe_compose') return "au Passé Composé"; return "au " + t; }
    
    async function init() { await loadGame(); startRound(1); }

    function startRound(r) {
        session.round = r; session.lives = 3; session.qDone = 0; session.mistakes = [];
        const badge = document.getElementById('round-tag');
        if(r === 4) { badge.innerText = "⭐ SUPER DÉFI ⭐"; badge.className = "round-tag bonus-mode"; } else { badge.innerText = `Manche ${r} / 3`; badge.className = "round-tag"; }
        document.getElementById('modal-round').style.display = 'none'; updateUI(); nextQ();
    }
    
    function nextQ() {
        if(session.qDone >= session.qTotal) { finishRound(true); return; }
        document.getElementById('feedback-area').style.display = 'none'; document.getElementById('inp-answer').value = ''; document.getElementById('inp-answer').focus(); document.getElementById('q-idx').innerText = session.qDone + 1;
        let pool = gameData.activeVerbs.length ? gameData.activeVerbs : Object.keys(VERBS); let verb = pool[Math.floor(Math.random()*pool.length)]; let tense = gameData.activeTenses[Math.floor(Math.random()*gameData.activeTenses.length)]; let i = Math.floor(Math.random()*9);
        let conj = conjuguer(verb, tense, i); let q = {verb, tense, i, expected:conj, type:'mot', display:'', verbOnly:conj};

        if(session.round === 1) { let p = PRONOUNS[i]; if(i===0 && ['a','e','i','o','u','y','h'].includes(conj[0])) p="j'"; q.display = `Conjugue <span class="highlight">${verb}</span><br>avec <span class="highlight">${p}</span> <span class="tense-hl">${tenseLabelWithPrep(tense)}</span>.`; q.checkPro = p; document.getElementById('instruction').innerText = "Conjugaison simple"; } 
        else if(session.round === 2) { let srcTense = 'present'; if(tense === 'present') srcTense = 'imparfait'; let s = getSubj(i, verb, srcTense); let vSrc = conjuguer(verb, srcTense, i); let c = getAdjAccord(verb, i); let srcPhrase = `${s} ${vSrc} ${c}`; let s2 = getSubj(i, verb, tense); let tgt = `${s2} ${conj} ${c}`; q.display = `<small>Phrase ${tenseLabelWithPrep(srcTense)} :</small><br><i>"${srcPhrase}"</i><br><br>👉 Écris-la <span class="tense-hl">${tenseLabelWithPrep(tense)}</span> :`; q.expected = tgt; q.type = 'phrase'; document.getElementById('instruction').innerText = "OBJECTIF : CHANGER LE TEMPS"; } 
        else if(session.round === 3) { let i2 = Math.floor(Math.random()*9); while(i2===i) i2 = Math.floor(Math.random()*9); let s = getSubj(i, verb, tense); let v1 = conjuguer(verb, tense, i); let c = getAdjAccord(verb, i); let src = `${s} ${v1} ${c}`; let s2 = getSubj(i2, verb, tense, true); let v2 = conjuguer(verb, tense, i2); let c2 = getAdjAccord(verb, i2); let tgt = `${s2} ${v2} ${c2}`; q.display = `<small>Remplace le sujet par <b>${s2}</b> :</small><br>"${src}"`; q.expected = tgt; q.verbOnly = v2; q.type = 'phrase'; document.getElementById('instruction').innerText = "OBJECTIF : CHANGER LE SUJET (Garde le temps !)"; }
        else if(session.round === 4) { let iNew = Math.floor(Math.random()*9); while(iNew===i) iNew = Math.floor(Math.random()*9); let srcTense = (tense === 'present') ? 'imparfait' : 'present'; let sSrc = getSubj(i, verb, srcTense); let vSrc = conjuguer(verb, srcTense, i); let c = getAdjAccord(verb, i); let srcPhrase = `${sSrc} ${vSrc} ${c}`; let sTarget = getSubj(iNew, verb, tense, true); let vTarget = conjuguer(verb, tense, iNew); let c2 = getAdjAccord(verb, iNew); let finalPhrase = `${sTarget} ${vTarget} ${c2}`; q.display = `<small>Phrase de départ :</small><br><i>"${srcPhrase}"</i><br><br>👉 Transforme avec <b class="highlight">${sTarget}</b> <b class="tense-hl">${tenseLabelWithPrep(tense)}</b> :`; q.expected = finalPhrase; q.verbOnly = vTarget; q.type = 'phrase'; document.getElementById('instruction').innerText = "DOUBLE DÉFI : Change le sujet ET le temps !"; }
        session.current = q; document.getElementById('q-content').innerHTML = q.display;
    }
    
    function checkAnswer() {
        let u = clean(document.getElementById('inp-answer').value); if(!u) return; let exp = clean(session.current.expected); let vOnly = clean(session.current.verbOnly); let status = 'wrong';
        if(session.current.type === 'mot') { let p = clean(session.current.checkPro); if(u === vOnly || u === clean(p+" "+vOnly)) status = 'correct'; } else { if(u === exp) status = 'correct'; else if(u.includes(vOnly)) status = 'warning'; }
        let fb = document.getElementById('feedback-area'); let ft = document.getElementById('fb-title'); let fm = document.getElementById('fb-msg'); let fc = document.getElementById('fb-corr'); fb.style.display = 'block';
        
        if(status === 'correct') { 
            fb.className = 'fb-success'; ft.innerText = "✨ Bravo !"; fm.innerText = "Réponse parfaite."; fc.innerText = ""; 
            addXP(10 + session.round*5); 
            setTimeout(() => { session.qDone++; nextQ(); }, 1500); 
        } 
        else if(status === 'warning') { 
            fb.className = 'fb-warning'; ft.innerText = "⚠️ Presque !"; fm.innerText = "Le verbe est bon, mais attention à l'orthographe autour."; fc.innerText = session.current.expected; 
            addXP(5); 
            setTimeout(() => { session.qDone++; nextQ(); }, 4000); 
        } 
        else { 
            fb.className = 'fb-error'; ft.innerText = "❌ Aïe !"; fm.innerText = "Erreur de conjugaison."; fc.innerText = session.current.expected; 
            session.lives--; session.mistakes.push({q:session.current.display, u:document.getElementById('inp-answer').value, c:session.current.expected}); 
            updateUI(); 
            if(session.lives <= 0) setTimeout(() => finishRound(false), 2000); else setTimeout(() => { session.qDone++; nextQ(); }, 4000); 
        }
    }
    
    function finishRound(win) {
        let m = document.getElementById('modal-round'); let t = document.getElementById('mod-title'); let b = document.getElementById('mod-body'); let acts = document.getElementById('mod-actions'); m.style.display = 'flex'; acts.innerHTML = ""; 
        if(!win) { t.innerText = "Perdu !"; t.style.color = "#d63031"; b.innerHTML = "<p>Plus de vies... Il faut retenter !</p>"; let btn = mkBtn("Recommencer", () => startRound(session.round), false); acts.appendChild(btn); return; }
        t.innerText = (session.round === 4) ? "🏆 DÉFI RÉUSSI ! 🏆" : `Bilan Manche ${session.round}`; t.style.color = "#2d3436";
        if(session.mistakes.length === 0) b.innerHTML = "<h3 style='color:#00b894'>🌟 SANS FAUTE ! 🌟</h3>"; else { let h = `<table class="err-table"><tr><th>Toi</th><th>Correction</th></tr>`; session.mistakes.forEach(x => h+=`<tr><td class="err-bad">${x.u}</td><td>${x.c}</td></tr>`); b.innerHTML = "<p>Quelques erreurs :</p>" + h + "</table>"; }
        if(session.round < 3) { acts.appendChild(mkBtn("Manche Suivante", () => startRound(session.round + 1), true)); } 
        else if(session.round === 3) { acts.appendChild(mkBtn("Terminer", () => startRound(1), false)); let bonusBtn = document.createElement("button"); bonusBtn.className = "btn-main btn-bonus"; bonusBtn.style.fontSize = "1em"; bonusBtn.innerText = "🚀 SUPER DÉFI !"; bonusBtn.onclick = () => startRound(4); acts.appendChild(bonusBtn); } 
        else { b.innerHTML += "<p style='font-size:1.2em; font-weight:bold; color:#e84393;'>Tu es un champion de la conjugaison !</p>"; acts.appendChild(mkBtn("Nouvelle Partie", () => startRound(1), true)); }
    }
    
    function mkBtn(txt, fn, primary) { let b = document.createElement("button"); b.className = "btn-main"; if(!primary) { b.style.background = "#b2bec3"; b.style.boxShadow="none"; } b.style.fontSize = "1em"; b.style.padding = "10px 20px"; b.innerText = txt; b.onclick = fn; return b; }
    function clean(s) { return s.toLowerCase().replace(/[.,!?;:]/g,'').replace(/\s+/g,' ').replace(/’/g,"'").trim(); }
    function getSubj(i, v, t, cx=false) { let txt = PRONOUNS[i]; if(cx && Math.random()<0.4) { let m = SUBJECTS.filter(x=>x.i===i); if(m.length) txt = m[Math.floor(Math.random()*m.length)].txt; } let st = conjuguer(v,t,i)[0]; if(i===0 && ['a','e','i','o','u','y','h'].includes(st)) { if(txt==='je') return "j'"; } return txt.charAt(0).toUpperCase()+txt.slice(1); }
    
    function addXP(n) { 
        gameData.totalXP += n; 
        
        // Calcul visuel du "niveau" (100xp par niveau pour la jauge locale)
        let visualXP = gameData.totalXP % 100;
        document.getElementById('xp-fill').style.width = (visualXP) + "%"; 
        document.getElementById('xp-text').innerText = `${visualXP}/100`; 
        
        saveGameCloud(); 
        updateUI(); 
    }
    
    function updateUI() { 
        document.getElementById('lvl-display').innerText = gameData.totalXP; 
        
        let visualXP = gameData.totalXP % 100;
        document.getElementById('xp-fill').style.width = (visualXP) + "%"; 
        document.getElementById('xp-text').innerText = `${visualXP}/100`; 

        let h = ""; for(let i=0; i<3; i++) h += (i < session.lives) ? "❤️" : "🖤"; 
        document.getElementById('hearts-display').innerText = h; 
    }
    
    function openSettings() { ['pres','imp','pc','fut'].forEach(k => { let v = k==='pres'?'present':k==='imp'?'imparfait':k==='pc'?'passe_compose':'futur'; document.getElementById(`t-${k}`).checked = gameData.activeTenses.includes(v); }); let c = document.getElementById('verb-list'); c.innerHTML=''; Object.keys(VERBS).forEach(v => { let ch = gameData.activeVerbs.includes(v)?'checked':''; c.innerHTML += `<label><input type="checkbox" value="${v}" ${ch}> ${v}</label>`; }); document.getElementById('modal-settings').style.display='flex'; }
    function toggleAllVerbs() { let els = document.querySelectorAll('#verb-list input'); let all = Array.from(els).every(e=>e.checked); els.forEach(e=>e.checked = !all); }
    function saveSettings() { 
        let t=[]; if(document.getElementById('t-pres').checked) t.push('present'); if(document.getElementById('t-imp').checked) t.push('imparfait'); if(document.getElementById('t-pc').checked) t.push('passe_compose'); if(document.getElementById('t-fut').checked) t.push('futur'); 
        let v=[]; document.querySelectorAll('#verb-list input:checked').forEach(e=>v.push(e.value)); 
        if(t.length && v.length) { 
            gameData.activeTenses = t; gameData.activeVerbs = v; 
            saveSettingsLocal(); 
            document.getElementById('modal-settings').style.display='none'; 
            startRound(session.round); 
        } else alert("Choix invalide"); 
    }
    
    document.getElementById('inp-answer').addEventListener('keypress', e=>{if(e.key==='Enter') checkAnswer();});
    init();
</script>
</body>
</html>
