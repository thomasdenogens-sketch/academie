<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Géographie Découverte - Lola Cloud</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #2c3e50; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #app { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 600px; width: 100%; text-align: center; position: relative; }
        h1 { color: #27ae60; font-weight: 900; margin-bottom: 5px; }
        .xp { position: absolute; top: 20px; right: 25px; font-weight: bold; background: #fff3cd; color: #f39c12; padding: 5px 15px; border-radius: 20px; border: 2px solid #ffeeba; }
        .select-nv { width: 100%; padding: 10px; font-size: 1.1rem; border-radius: 10px; border: 2px solid #27ae60; font-weight: bold; margin: 15px 0; cursor: pointer; }
        #question { font-size: 1.4rem; font-weight: 700; margin: 25px 0; min-height: 50px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .btn-opt { background: #f8f9fa; border: 2px solid #cbd5e1; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-opt:hover { background: #e2e8f0; transform: translateY(-2px); }
        .btn { background: #627d98; color: white; padding: 10px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; text-decoration: none; display: inline-block; }
        #feedback { font-size: 1.3rem; font-weight: 900; height: 30px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="app">
        <div class="xp" id="hud-xp">XP: ... ⭐</div>
        <h1>Globe-Trotteuse 🌍</h1>
        <p style="color: #7f8c8d; font-weight: bold;">Le jeu d'exploration de Lola</p>

        <select id="select-niveau" class="select-nv" onchange="changerNiveau()">
            <option value="1">🟢 Niveau 1 : Animaux & Monuments (Facile)</option>
            <option value="2">🟠 Niveau 2 : Capitales & Continents (Plus Dur ! 🔥)</option>
        </select>

        <div id="question">Chargement...</div>
        <div class="options" id="zone-options"></div>
        <div id="feedback"></div>

        <button class="btn" onclick="window.location.href='index.html'">🏠 Retour à l'Académie</button>
    </div>

    <script>
        const FIREBASE_URL = "https://academie-famille-default-rtdb.europe-west1.firebasedatabase.app/";
        let xpGlobale = 0, niveauActuel = 1, questionActuelle = null;

        const questionsN1 = [
            { q: "Où se trouve la célèbre Tour Eiffel ? 🗼", r: ["En France 🇫🇷", "En Italie 🇮🇹", "Au Japon 🇯🇵", "En Espagne 🇪🇸"], c: 0 },
            { q: "Où peut-on voir de grands Kangourous sauvages ? 🦘", r: ["Au Canada 🇨🇦", "En Australie 🇦🇺", "En Afrique 🇿🇦", "En Chine 🇨🇳"], c: 1 },
            { q: "Où se cachent les Pyramides des Pharaons ? 📐", r: ["Au Brésil 🇧🇷", "En Égypte 🇪🇬", "En France 🇫🇷", "En Inde 🇮🇳"], c: 1 },
            { q: "Quel pays est connu pour ses délicieux sushis et ses Samouraïs ? 🍣", r: ["Le Japon 🇯🇵", "La Chine 🇨🇳", "L'Italie 🇮🇹", "L'Amérique 🇺🇸"], c: 0 }
        ];

        const questionsN2 = [
            { q: "Quelle est la capitale de la France ? 🇨🇵", r: ["Lyon", "Marseille", "Paris", "Londres"], c: 2 },
            { q: "Sur quel continent se trouve le fleuve Amazone et le Brésil ? 🐆", r: ["L'Afrique", "L'Europe", "L'Asie", "L'Amérique du Sud"], c: 3 },
            { q: "Quelle est la capitale de l'Italie (le pays de la pizza) ? 🍕", r: ["Rome", "Venise", "Milan", "Madrid"], c: 0 },
            { q: "Quel est le plus grand continent du monde (où il y a la Chine et l'Inde) ? 🐼", r: ["L'Afrique", "L'Asie", "L'Europe", "L'Océanie"], c: 1 }
        ];

        async function chargerXP() {
            try {
                let res = await fetch(`${FIREBASE_URL}scores/lola/geoLola.json`);
                let data = await res.json();
                xpGlobale = data ? (parseInt(data.xp) || 0) : 0;
                document.getElementById('hud-xp').textContent = `XP: ${xpGlobale} ⭐`;
            } catch(e) { console.error(e); }
            NouvelleQuestion();
        }

        async function ajouterXP(p) {
            xpGlobale += p;
            document.getElementById('hud-xp').textContent = `XP: ${xpGlobale} ⭐`;
            await fetch(`${FIREBASE_URL}scores/lola/geoLola.json`, { method: 'PUT', body: JSON.stringify({ xp: xpGlobale }) });
        }

        function changerNiveau() {
            niveauActuel = parseInt(document.getElementById('select-niveau').value);
            NouvelleQuestion();
        }

        function NouvelleQuestion() {
            document.getElementById('feedback').textContent = "";
            let liste = niveauActuel === 1 ? questionsN1 : questionsN2;
            questionActuelle = liste[Math.floor(Math.random() * liste.length)];
            
            document.getElementById('question').textContent = questionActuelle.q;
            const zone = document.getElementById('zone-options');
            zone.innerHTML = "";

            questionActuelle.r.forEach((opt, idx) => {
                let b = document.createElement('button');
                b.className = "btn-opt";
                b.textContent = opt;
                b.onclick = () => verifierReponse(idx);
                zone.appendChild(b);
            });
        }

        function verifierReponse(idx) {
            const fb = document.getElementById('feedback');
            if (idx === questionActuelle.c) {
                fb.textContent = "🎉 BRAVO LOLA ! C'est juste !";
                fb.style.color = "#2ecc71";
                ajouterXP(5);
                setTimeout(NouvelleQuestion, 2000);
            } else {
                fb.textContent = "❌ Essaie encore, tu peux y arriver !";
                fb.style.color = "#e74c3c";
            }
        }

        chargerXP();
    </script>
</body>
</html>
