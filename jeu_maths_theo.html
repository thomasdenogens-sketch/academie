<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mathématiques - Centre d'Entraînement CM1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #333; text-align: center; }
        #conteneur-appli { width: 95%; max-width: 600px; background-color: #ffffff; padding: 25px 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; }
        .ecran { display: none; animation: fadeIn 0.4s ease-out; }
        .ecran.actif { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-size: 1.8rem; color: #007bff; margin-bottom: 10px; }
        h2 { font-size: 1.4rem; color: #0056b3; margin-bottom: 15px; }
        p { margin-bottom: 15px; color: #666; }
        
        .btn { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 600; padding: 12px; margin: 8px 0; border: none; border-radius: 12px; cursor: pointer; width: 100%; color: white; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-principal { background-color: #007bff; box-shadow: 0 4px #0056b3; }
        .btn-secondaire { background-color: #17a2b8; box-shadow: 0 4px #117a8b; }
        .btn-defi { background-color: #e74c3c; box-shadow: 0 4px #c0392b; }
        .btn-neutre { background-color: #95a5a6; box-shadow: 0 4px #7f8c8d; }
        .btn-vert { background-color: #28a745; box-shadow: 0 4px #218838; }
        
        .grille-tables { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; padding: 0 20px; }
        .check-table { display: none; }
        .label-table { display: block; padding: 12px 0; background: #f0f2f5; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: #aaa; }
        .check-table:checked + .label-table { background: #007bff; color: white; border-color: #0056b3; transform: translateY(-2px); }
        
        .switch-container { display: flex; align-items: center; justify-content: center; background: #fff3cd; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ffeeba; }
        .switch-label { margin-left: 10px; font-weight: bold; color: #856404; cursor: pointer;}
        
        #barre-temps-conteneur { width: 100%; height: 8px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; opacity: 0; }
        #barre-temps-remplissage { height: 100%; width: 100%; background: #007bff; }
        #header-manche { background: #e9ecef; border-radius: 10px; padding: 8px 15px; display: inline-block; margin-bottom: 15px; font-weight: bold; color: #495057; }
        #infos-jeu { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; align-items: center; }
        
        #question { font-size: 3.2rem; font-weight: 700; margin: 15px 0; color: #333; min-height: 80px; display: flex; justify-content: center; align-items: center; }
