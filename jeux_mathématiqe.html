<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Le Laboratoire des Fractions - CM1/CM2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #333; text-align: center; }
        
        #app-container { width: 95%; max-width: 700px; background-color: #ffffff; padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative; }
        .ecran { display: none; animation: fadeIn 0.4s ease-out; }
        .ecran.actif { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-size: 2rem; color: #d35400; margin-bottom: 10px; font-weight: 900;}
        p { margin-bottom: 20px; color: #7f8c8d; font-size: 1.1rem; }
        
        .xp-badge { position: absolute; top: 20px; right: 25px; font-weight: bold; background: #fff3cd; color: #f39c12; padding: 5px 15px; border-radius: 20px; border: 2px solid #ffeeba; font-size: 1.1rem;}

        .grid-niveaux { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        
        .btn-niveau { 
            background: #f8f9fa; border: 3px solid #cbd5e1; padding: 20px 15px; border-radius: 16px; 
            cursor: pointer; transition: 0.2s; text-align: left; display: flex; flex-direction: column; gap: 5px;
        }
        .btn-niveau:hover { transform: translateY(-3px); border-color: #f39c12; box-shadow: 0 10px 15px rgba(243, 156, 18, 0.2); }
        .btn-niveau h3 { color: #2c3e50; font-size: 1.2rem; }
        .btn-niveau span { color: #7f8c8d; font-size: 0.9rem; font-weight: 600;}

        .btn-menu { background: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; text-decoration: none; display: inline-block;}
        
        /* Styles de la zone de jeu */
        #hud-jeu { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #ecf0f1;}
        #question-titre { font-size: 1.5rem; color: #2c3e50; margin-bottom: 30px; font-weight: 700; line-height: 1.4;}
        
        .zone-reponses { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-rep { 
            background: white; border: 3px solid #3498db; padding: 15px 25px; border-radius: 15px; 
            font-size: 1.5rem; font-weight: bold; color: #2980b9; cursor: pointer; box-shadow: 0 4px 0 #2980b9;
            min-width: 120px; transition: 0.1s; display: flex; justify-content: center; align-items: center;
        }
        .btn-rep:active { transform: translateY(4px); box-shadow: none; }
        .btn-rep.correct { background: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #2196f3; }
        .btn-rep.erreur { background: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; }

        /* Rendu visuel d'une fraction */
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 5px; font-weight: 900;}
        .frac span:first-child { border-bottom: 3px solid currentColor; padding: 0 5px; }
        .frac span:last-child { padding: 0 5px; }

        #feedback { font-size: 1.4rem; font-weight: 900; height: 35px; margin-top: 25px; }
        
        .result-box { background: #f0f4f8; padding: 20px; border-radius: 15px; margin-bottom: 20px; font-size: 1.2rem;}
        .highlight { color: #d35400; font-size: 1.8rem; font-weight: 900;}
    </style>
</head>
<body>

    <div id="app-container">
        <div class="xp-badge" id="hud-xp">XP: ... ⭐</div>
        
        <div id="ecran-menu" class="ecran actif">
            <h1>🍕 Laboratoire des Fractions</h1>
            <p>Choisis ton niveau d'entraînement :</p>

            <div class="grid-niveaux">
                <button class="btn-niveau" onclick="lancerJeu(1)">
                    <h3>🟢 Niveau 1 : Le Vocabulaire</h3>
                    <span>CM1 - Noms et écritures</span>
                </button>
                <button class="btn-niveau" onclick="lancerJeu(2)">
                    <h3>🟠 Niveau 2 : Comparaison</h3>
                    <span>CM1 - Plus grand ou plus petit que 1 ?</span>
                </button>
                <button class="btn-niveau" onclick="lancerJeu(3)">
                    <h3>🔴 Niveau 3 : Opérations</h3>
                    <span>Prépa CM2 - Additions de fractions</span>
                </button>
                <button class="btn-niveau" onclick="lancerJeu(4)">
                    <h3>🟣 Niveau 4 : Décimales</h3>
                    <span>Prépa CM2 - Dixièmes & Centièmes</span>
                </button>
            </div>

            <a href="index.html" class="btn-menu">🏠 Retour à l'Académie</a>
        </div>

        <div id="ecran-jeu" class="ecran">
            <div id="hud-jeu">
                <span id="vies-ui" style="letter-spacing: 5px;">❤️❤️❤️</span>
                <span id="progression-ui">1 / 10</span>
            </div>
            
            <div id="question-titre">Chargement...</div>
            
            <div class="zone-reponses" id="zone-reponses">
                </div>
            
            <div id="feedback"></div>
        </div>

        <div id="ecran-fin" class="ecran">
            <h1 id="fin-titre">Entraînement Terminé !</h1>
            <div class="result-box">
                Ton score : <span id="fin-score" class="highlight">0</span> / 10<br><br>
                XP Gagné : <span id="fin-xp" style="color:#2ecc71; font-weight:bold;">+0 ⭐</span>
            </div>
            <button class="btn-menu" style="background:#3498db; margin-right:10px;" onclick="lancerJeu(niveauActuel)">🔄 Rejouer ce niveau</button>
            <button class="btn-menu" onclick="montrerMenu()">Retour au menu</button>
        </div>

    </div>

    <script>
        const FIREBASE_URL = "https://academie-famille-default-rtdb.europe-west1.firebasedatabase.app/";
        const DB_URL = `${FIREBASE_URL}scores/theo/fractionsPro.json`;

        let xpGlobal = 0;
        let niveauActuel = 1;
        let vies = 3;
        let numQuestion = 0;
        let score = 0;
        let bloque = false;
        let bonneReponseIndex = -1;

        // Générateurs de texte
        const numerateursTxt = ["Un", "Deux", "Trois", "Quatre", "Cinq", "Six", "Sept", "Huit", "Neuf", "Dix"];
        const denominateursTxt = ["", "", "demi", "tiers", "quart", "cinquième", "sixième", "septième", "huitième", "neuvième", "dixième"];

        const E = (id) => document.getElementById(id);

        // --- GESTION DU CLOUD ---
        async function chargerXP() {
            try {
                let res = await fetch(DB_URL);
                let data = await res.json();
                if(data && data.xp) xpGlobal = parseInt(data.xp);
                E('hud-xp').textContent = `XP: ${xpGlobal} ⭐`;
            } catch(e) {}
        }

        async function ajouterXP(montant) {
            if(montant <= 0) return;
            xpGlobal += montant;
            E('hud-xp').textContent = `XP: ${xpGlobal} ⭐`;
            try { await fetch(DB_URL, { method: 'PUT', body: JSON.stringify({ xp: xpGlobal }) }); } catch(e) {}
        }

        // --- MOTEUR DE JEU ---
        function montrerMenu() {
            E('ecran-jeu').classList.remove('actif');
            E('ecran-fin').classList.remove('actif');
            E('ecran-menu').classList.add('actif');
        }

        function formatterFrac(n, d) {
            return `<div class="frac"><span>${n}</span><span>${d}</span></div>`;
        }

        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function lancerJeu(niveau) {
            niveauActuel = niveau;
            vies = 3;
            numQuestion = 1;
            score = 0;
            bloque = false;
            
            E('ecran-menu').classList.remove('actif');
            E('ecran-fin').classList.remove('actif');
            E('ecran-jeu').classList.add('actif');
            
            poserQuestion();
        }

        function poserQuestion() {
            if(vies <= 0 || numQuestion > 10) return terminerJeu();
            
            bloque = false;
            E('feedback').textContent = "";
            E('vies-ui').textContent = "❤️".repeat(vies) + "🖤".repeat(3-vies);
            E('progression-ui').textContent = `${numQuestion} / 10`;

            let qData = genererQuestion(niveauActuel);
            
            E('question-titre').innerHTML = qData.question;
            const zone = E('zone-reponses');
            zone.innerHTML = "";

            bonneReponseIndex = qData.correctIdx;

            qData.choix.forEach((choixHTML, i) => {
                let btn = document.createElement('button');
                btn.className = "btn-rep";
                btn.innerHTML = choixHTML;
                btn.onclick = () => verifierReponse(btn, i);
                zone.appendChild(btn);
            });
        }

        // --- GÉNÉRATION PROCÉDURALE DES QUESTIONS ---
        function genererQuestion(niv) {
            let qStr = "", choix = [], correctIdx = 0;
            
            if(niv === 1) {
                // CM1 - Noms : "Trois quarts" -> 3/4
                let n = randomInt(1, 9);
                let d = randomInt(2, 10);
                
                let nom = numerateursTxt[n-1] + " " + denominateursTxt[d] + (n > 1 && d > 1 ? "s" : "");
                qStr = `Quelle fraction correspond à :<br><span style="color:#2980b9;">"${nom}"</span> ?`;
                
                let reponseJuste = formatterFrac(n, d);
                let faux1 = formatterFrac(d, n); // Inversion
                let faux2 = formatterFrac(n, randomInt(2,10)); // Faux dénominateur
                while(faux2 === reponseJuste || faux2 === faux1) faux2 = formatterFrac(n, randomInt(2,10));

                choix = [reponseJuste, faux1, faux2];
            }
            else if(niv === 2) {
                // CM1 - Comparaison à 1
                let n = randomInt(1, 12);
                let d = randomInt(2, 12);
                qStr = `La fraction ${formatterFrac(n, d)} est-elle :`;
                choix = ["Plus petite que 1", "Égale à 1", "Plus grande que 1"];
                
                if(n < d) correctIdx = 0;
                else if(n === d) correctIdx = 1;
                else correctIdx = 2;
                
                return { question: qStr, choix: choix, correctIdx: correctIdx }; // Retour direct car logique spécifique
            }
            else if(niv === 3) {
                // CM2 - Additions même dénominateur
                let d = randomInt(3, 15);
                let n1 = randomInt(1, d-1);
                let n2 = randomInt(1, d-1);
                
                qStr = `Calcule :<br>${formatterFrac(n1, d)} + ${formatterFrac(n2, d)} = ?`;
                
                let repJuste = formatterFrac(n1+n2, d);
                let faux1 = formatterFrac(n1+n2, d+d); // Piège classique : additionner les dénominateurs
                let faux2 = formatterFrac(Math.abs(n1-n2) || 1, d);

                choix = [repJuste, faux1, faux2];
            }
            else if(niv === 4) {
                // CM2 - Décimales (Dixièmes et Centièmes)
                let type = randomInt(1, 2);
                if(type === 1) {
                    // Équivalence dixième -> centième (ex: 3/10 = 30/100)
                    let n = randomInt(1, 9);
                    qStr = `Trouve la fraction équivalente :<br>${formatterFrac(n, 10)} = ?`;
                    choix = [formatterFrac(n*10, 100), formatterFrac(n, 100), formatterFrac(n*10, 10)];
                } else {
                    // Addition de fractions décimales (ex: 5/10 + 3/100 = 53/100)
                    let d1 = randomInt(1, 9);
                    let c1 = randomInt(1, 9);
                    qStr = `Calcule :<br>${formatterFrac(d1, 10)} + ${formatterFrac(c1, 100)} = ?`;
                    choix = [formatterFrac((d1*10)+c1, 100), formatterFrac(d1+c1, 100), formatterFrac(d1+c1, 10)];
                }
            }

            // Mélange des 3 choix pour les niveaux 1, 3 et 4
            let indices = [0, 1, 2].sort(() => Math.random() - 0.5);
            let choixMelanges = [choix[indices[0]], choix[indices[1]], choix[indices[2]]];
            correctIdx = indices.indexOf(0); // L'index 0 contenait la bonne réponse avant le mélange

            return { question: qStr, choix: choixMelanges, correctIdx: correctIdx };
        }

        // --- VALIDATION ---
        function verifierReponse(btn, idx) {
            if(bloque) return;
            bloque = true;

            let boutons = document.querySelectorAll('.btn-rep');
            
            if(idx === bonneReponseIndex) {
                btn.classList.add('correct');
                E('feedback').textContent = "Excellent ! ✨";
                E('feedback').style.color = "#27ae60";
                score++;
                setTimeout(() => { numQuestion++; poserQuestion(); }, 1000);
            } else {
                btn.classList.add('erreur');
                boutons[bonneReponseIndex].classList.add('correct'); // Montrer la bonne réponse
                vies--;
                E('vies-ui').textContent = "❤️".repeat(vies) + "🖤".repeat(3-vies);
                E('feedback').textContent = "Aïe... Regarde la correction !";
                E('feedback').style.color = "#c0392b";
                setTimeout(() => { numQuestion++; poserQuestion(); }, 2500);
            }
        }

        // --- FIN DU JEU ---
        function terminerJeu() {
            E('ecran-jeu').classList.remove('actif');
            E('ecran-fin').classList.add('actif');
            
            let xpGagne = score * 3; // 3 XP par bonne réponse
            
            E('fin-titre').textContent = vies > 0 ? "Bravo Théo ! 🎉" : "Dommage... 💀";
            E('fin-titre').style.color = vies > 0 ? "#27ae60" : "#c0392b";
            E('fin-score').textContent = score;
            E('fin-xp').textContent = `+${xpGagne} ⭐`;

            ajouterXP(xpGagne);
        }

        chargerXP();
    </script>
</body>
</html>
